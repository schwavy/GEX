<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Wavy Flow mark</title>
  <desc id="desc">A gold wave-shaped W with a subtle orbital accent on a transparent canvas.</desc>
  <defs>
    <linearGradient id="gold" x1="104" y1="138" x2="410" y2="378" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF3B0"/>
      <stop offset="0.36" stop-color="#F3D87A"/>
      <stop offset="0.72" stop-color="#D8B75B"/>
      <stop offset="1" stop-color="#F8C84E"/>
    </linearGradient>
    <linearGradient id="orbit" x1="102" y1="82" x2="430" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8DF88"/>
      <stop offset="0.55" stop-color="#D8B75B"/>
      <stop offset="0.83" stop-color="#8F70FF"/>
      <stop offset="1" stop-color="#35D7FF"/>
    </linearGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" values="1 0 0 0 0.95 0 1 0 0 0.73 0 0 1 0 0.24 0 0 0 .7 0" result="goldGlow"/>
      <feMerge><feMergeNode in="goldGlow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="196" fill="none" stroke="url(#orbit)" stroke-width="10" stroke-linecap="round" stroke-dasharray="820 180" transform="rotate(-28 256 256)" opacity=".92"/>
  <circle cx="256" cy="256" r="164" fill="none" stroke="#FFFFFF" stroke-opacity=".11" stroke-width="2" stroke-dasharray="4 14"/>
  <path d="M111 167C143 232 166 330 211 352C240 366 249 306 258 269C270 311 281 366 310 352C354 330 374 232 401 167" fill="none" stroke="#D8B75B" stroke-opacity=".18" stroke-width="52" stroke-linecap="round"/>
  <path d="M111 167C143 232 166 330 211 352C240 366 249 306 258 269C270 311 281 366 310 352C354 330 374 232 401 167" fill="none" stroke="url(#gold)" stroke-width="31" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M343 223C369 205 391 181 408 151" fill="none" stroke="#35D7FF" stroke-width="8" stroke-linecap="round" opacity=".95"/>
  <path d="M402 151L424 141L414 164Z" fill="#35D7FF"/>
</svg>
